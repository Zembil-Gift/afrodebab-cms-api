server:
  port: ${PORT:8080}
  error:
    include-stacktrace: never
    include-exception: false
    include-message: always
    include-binding-errors: never

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}?sslmode=${SSL_MODE:require}&channelBinding=disable
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  jwt:
    secret: ${APP_JWT_SECRET}
    expiresMinutes: ${APP_JWT_EXPIRESMINUTES:120}
  cloudflare:
    r2:
      s3Api: ${S3_API:}
      publicDevelopmentUrl: ${PUBLIC_DEVELOPMENT_URL:}
      tokenValue: ${TOKEN_VALUE:}
      accessKeyId: ${ACCESS_KEY_ID:}
      secretAccessKey: ${SECRET_ACCESS_KEY:}
      region: ${CLOUDFLARE_R2_REGION:auto}
  sendgrid:
    apiKey: ${SENDGRID_API_KEY:}
    fromEmail: ${SENDGRID_FROM_EMAIL:}
    fromName: ${SENDGRID_FROM_NAME:AfroDebab CMS}
  attendance:
    entryTime: ${ATTENDANCE_ENTRY_TIME:09:00}
    exitTime: ${ATTENDANCE_EXIT_TIME:17:00}
    lunchStartTime: ${ATTENDANCE_LUNCH_START_TIME:12:30}
    lunchEndTime: ${ATTENDANCE_LUNCH_END_TIME:13:30}
    graceMinutes: ${ATTENDANCE_GRACE_MINUTES:30}
    maxLunchBreakMinutes: ${ATTENDANCE_MAX_LUNCH_BREAK_MINUTES:70}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
