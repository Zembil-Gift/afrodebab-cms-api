server:
  port: ${PORT:8080}

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:cms}?sslmode=${SSL_MODE:require}&channelBinding=disable
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  jwt:
    secret: ${APP_JWT_SECRET:TEST_JWT}
    expiresMinutes: ${APP_JWT_EXPIRESMINUTES:120}
  cloudflare:
    r2:
      s3Api: ${S3_API:}
      publicDevelopmentUrl: ${PUBLIC_DEVELOPMENT_URL:}
      tokenValue: ${TOKEN_VALUE:}
      accessKeyId: ${ACCESS_KEY_ID:}
      secretAccessKey: ${SECRET_ACCESS_KEY:}
      region: ${CLOUDFLARE_R2_REGION:auto}
  sendgrid:
    apiKey: ${SENDGRID_API_KEY:}
    fromEmail: ${SENDGRID_FROM_EMAIL:}
    fromName: ${SENDGRID_FROM_NAME:AfroDebab CMS}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
